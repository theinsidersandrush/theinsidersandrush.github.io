<!DOCTYPE html>
<head></head>

<style>
.loader {
    border: 16px solid #f3f3f3; /* Light grey background */
    border-top: 16px solid #3498db; /* Blue top border (the "spinner" part) */
    border-radius: 50%; /* Makes it a circle */
    width: 120px;
    height: 120px;
    animation: spin 2s linear infinite; /* Applies the animation */
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
<html>
    <body>
        <div class="loader"><img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/OS_X_10.11_Beta_Beach_Ball.jpg"></div>
    </body>
</html>
